name: Validate Images

on:
  pull_request:
    paths:
      - "**/*.png"
      - "**/*.svg"

jobs:
  validate:
    name: Validate PNG and SVG images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed image files
        id: changed-files
        run: |
          git fetch origin "${{ github.base_ref }}"
          # List added or modified PNG/SVG files only (exclude deletions/renames)
          FILES=$(git diff --name-only --diff-filter=AM \
            "origin/${{ github.base_ref }}...HEAD" \
            | grep -E '\.(png|svg)$' || true)
          echo "Found image files:"
          echo "$FILES"
          # Store as space-separated list for the next step
          FILES_SPACE=$(echo "$FILES" | tr '\n' ' ' | xargs)
          echo "files=$FILES_SPACE" >> "$GITHUB_OUTPUT"
          if [ -n "$FILES_SPACE" ]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Pillow
        if: steps.changed-files.outputs.any_changed == 'true'
        run: pip install Pillow

      - name: Validate images
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          python3 .scripts/validate_images.py ${{ steps.changed-files.outputs.files }}
